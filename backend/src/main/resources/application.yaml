spring:
  application:
    name: backend
  profiles:
    include: secret

management:
  endpoints:
    web:
      exposure:
        # Docker healthcheck 用に /actuator/health のみ公開
        include: "health"

logging:
  file:
    # ログをファイル出力（tail -f /tmp/odds-alchemist/app.log でリアルタイム確認可能）
    # 絶対パス指定（相対パスは起動ディレクトリに依存するため）
    name: /tmp/odds-alchemist/app.log

slack:
  # false にすると通知を無効化（開発・テスト時の誤通知防止）
  enabled: true
  # 実際の値は application-secret.yaml で上書き
  webhook-url: ""

odds:
  scraping:
    # 書き込み先スプレッドシートの範囲
    # 実行間隔はレース発走時刻から動的に算出（30分/15分/5分/1分）
    sheet-range: "OddsData!A:H"
    # デバッグ用固定間隔（分）: 0=動的間隔（本番）、1以上=その分数で固定（動作確認用）
    debug-interval-minutes: 0
