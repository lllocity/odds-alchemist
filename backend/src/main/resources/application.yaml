spring:
  application:
    name: backend
  profiles:
    include: secret
  boot:
    admin:
      # Admin UIのパス（既存の /api/** と競合しないよう /admin に設定）
      context-path: /admin
      client:
        # 自身を監視対象として自己登録（context-path を含むURLを指定）
        url: http://localhost:8080/admin

management:
  endpoints:
    web:
      exposure:
        # Spring Boot AdminがActuatorから情報収集できるよう全エンドポイントを公開
        include: "*"

logging:
  file:
    # Spring Boot AdminでログストリームをUI上で確認できるようファイル出力を設定
    # 絶対パス指定（相対パスは起動ディレクトリに依存するため）
    name: /tmp/odds-alchemist/app.log

odds:
  scraping:
    # 書き込み先スプレッドシートの範囲
    # 実行間隔はレース発走時刻から動的に算出（30分/15分/5分/1分）
    sheet-range: "OddsData!A:H"
    # デバッグ用固定間隔（分）: 0=動的間隔（本番）、1以上=その分数で固定（動作確認用）
    debug-interval-minutes: 0
