spring:
  application:
    name: backend
  profiles:
    include: secret

odds:
  scraping:
    # 書き込み先スプレッドシートの範囲
    # 実行間隔はレース発走時刻から動的に算出（30分/15分/5分/1分）
    sheet-range: "シート1!A:G"
    # 監視対象のスポナビ競馬オッズページURL（複数指定可）
    target-urls:
      - "https://sports.yahoo.co.jp/keiba/race/odds/tfw/2606020211"
