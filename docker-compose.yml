services:
  backend:
    build: ./backend
    ports:
      - "8081:8080"
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/gcp-key.json
      TZ: Asia/Tokyo
      GOOGLE_SHEETS_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      SLACK_ENABLED: ${SLACK_ENABLED:-true}
    volumes:
      # Google 認証 JSON のマウント（イメージに含めない）
      - ${GCP_KEY_PATH}:/app/secrets/gcp-key.json:ro
      # ログファイルの永続化（コンテナ再起動後もログが消えないよう）
      - ./logs:/tmp/odds-alchemist
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8081}
        NEXT_PUBLIC_SPREADSHEET_ID: ${GOOGLE_SHEETS_SPREADSHEET_ID}
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Tokyo
    depends_on:
      backend:
        # バックエンドの healthcheck が UP になってから起動する
        condition: service_healthy
