services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/secrets/gcp-key.json
    volumes:
      # Google 認証 JSON のマウント（イメージに含めない）
      - ${GCP_KEY_PATH}:/app/secrets/gcp-key.json:ro
      # ログファイルの永続化（コンテナ再起動後もログが消えないよう）
      - ./logs:/tmp/odds-alchemist
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        # バックエンドの healthcheck が UP になってから起動する
        condition: service_healthy
